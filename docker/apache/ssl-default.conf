<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html/public

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /usr/local/apache2/ssl/server.crt
    SSLCertificateKeyFile /usr/local/apache2/ssl/server.key

    # Sécurité SSL
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Configuration PHP-FPM via proxy
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://iibs_php:9000"
    </FilesMatch>

    # Support pour les fichiers index.php
    DirectoryIndex index.php index.html

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>